<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrankensteinCastle — Task Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; font-size: 14px; }
.header { padding: 14px 20px; background: #fff; border-bottom: 1px solid #e5e3dc; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.header h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.05em; color: #666; }
.header-right { display: flex; gap: 8px; align-items: center; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #f0efe8; color: #666; border: 1px solid #e0ded6; }
.refresh-btn { font-size: 11px; padding: 3px 10px; border: 1px solid #e0ded6; border-radius: 4px; background: #fff; color: #666; cursor: pointer; }
.refresh-btn:hover { background: #f5f4f0; }
.main { padding: 16px 20px; max-width: 960px; }
.error-bar { background: #fde8e8; border: 1px solid #f0c0c0; border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; font-size: 12px; color: #c0392b; display: none; }
.sprint-label { font-size: 10px; font-weight: 600; color: #999; letter-spacing: 0.1em; text-transform: uppercase; margin: 20px 0 8px; }
.sprint-label:first-of-type { margin-top: 0; }
.cat-bar { border: 1px solid #e5e3dc; border-radius: 8px; margin-bottom: 5px; background: #fff; overflow: hidden; }
.bar-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; cursor: pointer; transition: background 0.1s; gap: 12px; }
.bar-header:hover { background: #faf9f6; }
.bar-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; overflow: hidden; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cat-name { font-size: 12px; font-weight: 500; color: #333; flex-shrink: 0; min-width: 90px; }
.pills { display: flex; gap: 4px; overflow: hidden; min-width: 0; }
.pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #f0efe8; color: #666; border: 1px solid #e0ded6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; flex-shrink: 0; }
.bar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.task-count { font-size: 11px; color: #bbb; }
.chevron { font-size: 9px; color: #ccc; transition: transform 0.15s; }
.chevron.open { transform: rotate(180deg); }
.task-list { display: none; border-top: 1px solid #f0efe8; }
.task-list.open { display: block; }
.task-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px; border-bottom: 1px solid #f5f4f0; cursor: pointer; transition: background 0.1s; }
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: #faf9f6; }
.task-row.done-row { opacity: 0.38; }
.job-badge { font-size: 10px; font-weight: 600; color: #7c6f9f; background: #f0eefb; border: 1px solid #d8d3f0; border-radius: 4px; padding: 1px 6px; flex-shrink: 0; font-variant-numeric: tabular-nums; margin-top: 1px; }
.done-row .job-badge { color: #aaa; background: #f5f4f0; border-color: #e0ded6; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 13px; color: #1a1a1a; line-height: 1.4; }
.done-row .task-title { text-decoration: line-through; }
.task-meta { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
.tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 500; }
.p1 { background: #fde8e8; color: #c0392b; }
.p2 { background: #fef3e2; color: #b7770d; }
.p3 { background: #e8f5e9; color: #2e7d32; }
.decision-tag { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; border-radius: 3px; font-size: 10px; padding: 1px 5px; font-weight: 600; }
.decision-row { background: #fffbf5; border-left: 3px solid #e65100; }
.done-tag { background: #e8f5e9; color: #2e7d32; }
.blocked-tag { background: #fde8e8; color: #c0392b; }
.note-dot { font-size: 10px; color: #9b8ec4; font-weight: 600; }
.log-dot { font-size: 10px; color: #1D9E75; font-weight: 600; }
.arrow { font-size: 12px; color: #ddd; flex-shrink: 0; padding-top: 1px; }
.overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.12); z-index: 90; display: none; }
.overlay.open { display: block; }
.panel { position: fixed; top: 0; right: 0; width: 360px; height: 100vh; background: #fff; border-left: 1px solid #e0ded6; z-index: 100; transform: translateX(100%); transition: transform 0.2s ease; display: flex; flex-direction: column; }
.panel.open { transform: translateX(0); }
.panel-top { padding: 14px 16px 12px; border-bottom: 1px solid #f0efe8; }
.panel-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.panel-id { font-size: 10px; color: #bbb; }
.close-btn { font-size: 11px; color: #aaa; cursor: pointer; padding: 2px 8px; border: 1px solid #e5e3dc; border-radius: 4px; }
.close-btn:hover { background: #f5f4f0; }
.panel-title { font-size: 14px; font-weight: 500; color: #1a1a1a; line-height: 1.4; }
.panel-scroll { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.panel-desc { font-size: 12px; color: #555; line-height: 1.65; }
.divider { border: none; border-top: 1px solid #f0efe8; }
.section-label { font-size: 10px; font-weight: 600; color: #bbb; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.notes-display { font-size: 12px; color: #333; line-height: 1.65; white-space: pre-wrap; background: #faf9f6; border-radius: 5px; padding: 10px 12px; min-height: 32px; }
.notes-display.empty { color: #ccc; font-style: italic; }
.notes-ts { font-size: 10px; color: #bbb; margin-top: 4px; }
.note-input { width: 100%; font-size: 12px; padding: 8px 10px; border: 1px solid #e0ded6; border-radius: 6px; background: #faf9f6; color: #1a1a1a; resize: none; font-family: inherit; min-height: 72px; }
.note-input:focus { outline: none; border-color: #9b8ec4; }
.btn-row { display: flex; gap: 6px; margin-top: 6px; }
.btn-save { font-size: 11px; padding: 5px 14px; border: 1px solid #9b8ec4; border-radius: 4px; background: #fff; color: #7c6f9f; cursor: pointer; font-weight: 500; }
.btn-save:hover { background: #f5f3fb; }
.btn-save:disabled { opacity: 0.4; cursor: default; }
.btn-clear { font-size: 11px; padding: 5px 10px; border: 1px solid #e0ded6; border-radius: 4px; background: #fff; color: #aaa; cursor: pointer; }
.save-status { font-size: 10px; color: #aaa; padding-top: 4px; min-height: 16px; }
.save-status.ok { color: #2e7d32; }
.save-status.err { color: #c0392b; }
.log-entry { padding: 8px 0; border-bottom: 1px solid #f0efe8; }
.log-entry:last-child { border-bottom: none; }
.log-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; flex-wrap: wrap; }
.log-agent { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #e8f5e9; color: #2e7d32; font-weight: 500; }
.log-action { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #f0efe8; color: #666; }
.log-date { font-size: 10px; color: #bbb; }
.log-result { font-size: 12px; color: #444; line-height: 1.55; }
.log-notes { font-size: 11px; color: #999; margin-top: 2px; line-height: 1.4; }
.loading-log { font-size: 11px; color: #bbb; font-style: italic; }
</style>
</head>
<body>
<div class="header">
  <h1>🏰 FRANKENSTEINCASTLE</h1>
  <div class="header-right">
    <span class="badge" id="total-badge">loading...</span>
    <button class="refresh-btn" onclick="init()">↻ refresh</button>
  </div>
</div>
<div class="main">
  <div class="error-bar" id="error-bar"></div>
  <div id="content"><div style="color:#aaa;font-size:12px;padding:20px 0">Loading from Supabase...</div></div>
</div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-top">
    <div class="panel-topbar">
      <span class="panel-id" id="p-id"></span>
      <span class="close-btn" onclick="closePanel()">close</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;">
      <span style="font-size:13px;font-weight:600;color:#7c6f9f;font-variant-numeric:tabular-nums;" id="p-jobnum"></span>
      <span style="font-size:10px;color:#bbb;" id="p-id"></span>
    </div>
    <div style="display:flex;align-items:baseline;gap:8px;">
      <span style="font-size:15px;font-weight:700;color:#7c6f9f;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;" id="p-jobnum"></span>
      <div class="panel-title" id="p-title"></div>
    </div>
  </div>
  <div class="panel-scroll">
    <div style="font-size:11px;color:#aaa;margin-bottom:2px;" id="p-jobref"></div>
    <div style="font-size:10px;color:#aaa;margin-bottom:4px;font-variant-numeric:tabular-nums;" id="p-jobref"></div>
    <div class="panel-desc" id="p-desc"></div>
    <hr class="divider">
    <div>
      <div class="section-label">your notes</div>
      <div class="notes-display empty" id="notes-display">no notes yet</div>
      <div class="notes-ts" id="notes-ts"></div>
    </div>
    <hr class="divider">
    <div>
      <div class="section-label">edit notes</div>
      <textarea class="note-input" id="note-input" placeholder="Context, decisions, blockers — read by Claude when this task comes up..."></textarea>
      <div class="btn-row">
        <button class="btn-save" id="btn-save" onclick="saveNote()">save</button>
        <button class="btn-clear" onclick="document.getElementById('note-input').value=''">clear</button>
      </div>
      <div class="save-status" id="save-status"></div>
    </div>
    <hr class="divider">
    <div>
      <div class="section-label">dev log</div>
      <div id="log-entries"><span class="loading-log">loading...</span></div>
    </div>
  </div>
</div>
<script>
const SUPA = 'https://xtuwsgicohmlgazcushj.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0dXdzZ2ljb2htbGdhemN1c2hqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzI5ODQ1OCwiZXhwIjoyMDg4ODc0NDU4fQ.lvCpNoQwLViH_JS-ycbxfNciJjboggqiBLBHu2pAf38';
const H = { apikey: KEY, Authorization: 'Bearer ' + KEY };
const CATS = {
  character:'#7F77DD','life-sim':'#378ADD',infra:'#1D9E75',debug:'#D85A30',
  voice:'#D4537E',photo:'#EF9F27',memory:'#639922',content:'#888780',
  integration:'#B4B2A9',review:'#B4B2A9',ue5:'#378ADD',
  rpg:'#A0522D',discord:'#5865F2'
};
const SPRINTS = [
  {key:'sprint-1',label:'Sprint 1 — foundation'},
  {key:'sprint-2',label:'Sprint 2 — depth'},
  {key:'sprint-3',label:'Sprint 3 — integrations'},
  {key:'backlog', label:'Backlog'},
];
let tasks=[], openBars={}, currentId=null;

async function api(path) {
  const r = await fetch(SUPA+path, {headers:H});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function init() {
  try {
    tasks = await api('/rest/v1/commander_tasks?order=id.asc&limit=200');
    document.getElementById('error-bar').style.display='none';
    render();
    if(currentId) openPanel(currentId);
  } catch(e) {
    const el=document.getElementById('error-bar');
    el.textContent='Load failed: '+e.message; el.style.display='block';
    document.getElementById('total-badge').textContent='error';
  }
}

function pTag(p){return`<span class="tag ${p===1?'p1':p===2?'p2':'p3'}">P${p}</span>`;}

function render() {
  const open=tasks.filter(t=>t.status!=='done').length;
  document.getElementById('total-badge').textContent=open+' open';
  let html='';
  SPRINTS.forEach(({key,label})=>{
    const st=tasks.filter(t=>t.sprint===key);
    if(!st.length) return;
    const map={};
    st.forEach(t=>{const c=t.category||'other';(map[c]=map[c]||[]).push(t);});
    html+=`<div class="sprint-label">${label}</div>`;
    Object.keys(map).forEach(cat=>{
      const ts=map[cat], active=ts.filter(t=>t.status!=='done'), top3=active.slice(0,3);
      const color=CATS[cat]||'#aaa', bk=key+'_'+cat, isOpen=openBars[bk];
      const pills=top3.map(t=>`<span class="pill">#${t.id} ${t.title}</span>`).join('');
      html+=`<div class="cat-bar">
        <div class="bar-header" onclick="toggle('${bk}')">
          <div class="bar-left">
            <div class="cat-dot" style="background:${color}"></div>
            <span class="cat-name">${cat}</span>
            <div class="pills">${pills}</div>
          </div>
          <div class="bar-right">
            <span class="task-count">${active.length}</span>
            <span class="chevron ${isOpen?'open':''}">▼</span>
          </div>
        </div>
        <div class="task-list ${isOpen?'open':''}" id="bar-${bk}">`;
      ts.forEach(t=>{
        const done=t.status==='done';
        const isDecision=t.status==='decision-pending';
        const hasNotes=t.notes&&t.notes.trim();
        const blocked=t.blocked_by&&t.blocked_by.length?t.blocked_by[0]:null;
        html+=`<div class="task-row ${done?'done-row':''} ${isDecision?'decision-row':''}" onclick="openPanel(${t.id})">
          <span class="task-num">#${t.id}</span>
          <div class="task-body">
            <div class="task-title">${t.title}</div>
            <div class="task-meta">
              ${pTag(t.priority||2)}
              ${done?'<span class="tag done-tag">done</span>':''}
              ${blocked?`<span class="tag blocked-tag">blocked #${blocked}</span>`:''}
              ${hasNotes?'<span class="note-dot">● note</span>':''}
            </div>
          </div>
          <span class="arrow">›</span>
        </div>`;
      });
      html+=`</div></div>`;
    });
  });
  document.getElementById('content').innerHTML=html;
}

function toggle(bk){openBars[bk]=!openBars[bk];render();}

async function openPanel(id) {
  const t=tasks.find(x=>x.id===id);
  if(!t) return;
  currentId=id;
  document.getElementById('p-id').textContent=`${t.sprint||'?'} · ${t.category||'?'} · ${t.status}`;
  document.getElementById('p-jobnum').textContent='#'+t.id;
  document.getElementById('p-title').textContent=t.title;
  document.getElementById('p-jobref').textContent='Job #'+t.id+' · Reference this number in commits and dev log entries.';
  document.getElementById('p-jobref').textContent='Job #'+t.id+' — reference this number in all dev log entries and commit messages.';
  document.getElementById('p-desc').textContent=t.description||'No description.';
  const nd=document.getElementById('notes-display');
  if(t.notes&&t.notes.trim()){
    nd.textContent=t.notes; nd.classList.remove('empty');
    const ts=t.notes_updated_at?new Date(t.notes_updated_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Los_Angeles'})+' PST':'';
    document.getElementById('notes-ts').textContent=ts?'updated '+ts:'';
  } else {
    nd.textContent='no notes yet'; nd.classList.add('empty');
    document.getElementById('notes-ts').textContent='';
  }
  document.getElementById('note-input').value=t.notes||'';
  document.getElementById('save-status').textContent='';
  document.getElementById('save-status').className='save-status';
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  loadLog(id);
}

async function loadLog(id) {
  const el=document.getElementById('log-entries');
  el.innerHTML='<span class="loading-log">loading...</span>';
  try {
    const entries=await api(`/rest/v1/dev_log?task_id=eq.${id}&order=created_at.desc&limit=20`);
    if(!entries.length){el.innerHTML='<span class="loading-log">no log entries yet</span>';return;}
    el.innerHTML=entries.map(e=>{
      const d=new Date(e.created_at);
      const ds=d.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/Los_Angeles'});
      return`<div class="log-entry">
        <div class="log-header">
          <span class="log-agent">${e.agent}</span>
          <span class="log-action">${e.action}</span>
          <span class="log-date">${ds}</span>
        </div>
        <div class="log-result">${e.result||''}</div>
        ${e.notes?`<div class="log-notes">${e.notes}</div>`:''}
      </div>`;
    }).join('');
  } catch(err){el.innerHTML=`<span class="loading-log">error: ${err.message}</span>`;}
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  currentId=null;
}

async function saveNote(){
  if(!currentId) return;
  const note=document.getElementById('note-input').value.trim();
  const btn=document.getElementById('btn-save'), st=document.getElementById('save-status');
  btn.disabled=true; st.textContent='saving...'; st.className='save-status';
  try {
    const r=await fetch(SUPA+'/rest/v1/commander_tasks?id=eq.'+currentId,{
      method:'PATCH',
      headers:{...H,'Content-Type':'application/json',Prefer:'return=representation'},
      body:JSON.stringify({notes:note,notes_updated_at:new Date().toISOString()})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const rows=await r.json();
    const t=tasks.find(x=>x.id===currentId);
    if(t&&rows[0]){t.notes=rows[0].notes;t.notes_updated_at=rows[0].notes_updated_at;}
    openPanel(currentId); render();
    st.textContent='saved ✓'; st.className='save-status ok';
  } catch(e){
    st.textContent='error: '+e.message; st.className='save-status err';
  } finally {btn.disabled=false;}
}

init();
setInterval(init,300000);
</script>
</body>
</html>
