<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOC Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080810;--surface:#0e0e1a;--s2:#141422;--s3:#1a1a2a;
  --border:#252538;--text:#c8c8e0;--dim:#555570;--bright:#f0f0ff;
  --blue:#4fc3f7;--purple:#b39ddb;--yellow:#ffd54f;--red:#ff5252;
  --green:#69f0ae;--orange:#ffab40;--gold:#e8c547;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;line-height:1.5;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);}
.hdr-left{display:flex;align-items:baseline;gap:10px;}
.logo{font-size:18px;font-weight:700;letter-spacing:3px;color:var(--gold);text-shadow:0 0 12px rgba(232,197,71,.3);}
.hdr-sub{font-size:10px;color:var(--dim);letter-spacing:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--s2);color:var(--dim);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn:active{transform:scale(.96);}
.btn.loading{opacity:.5;pointer-events:none;}
.btn-primary{border-color:var(--gold);color:var(--gold);background:rgba(232,197,71,.08);}
.btn-primary:hover{background:rgba(232,197,71,.15);}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.status-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
.status-dot.err{background:var(--red);box-shadow:0 0 8px var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* STATS BAR */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px 16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;}
.stat-num{font-size:26px;font-weight:700;line-height:1;}
.stat-label{font-size:10px;color:var(--dim);letter-spacing:1px;margin-top:4px;}

/* SECTIONS */
.main{max-width:900px;margin:0 auto;padding:0 12px 60px;}
.section{margin-top:16px;}
.section-hdr{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--dim);padding:8px 4px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.section-hdr:hover{color:var(--text);}
.section-hdr .chevron{transition:transform .2s;font-size:10px;}
.section-hdr.collapsed .chevron{transform:rotate(-90deg);}
.section-body.hidden{display:none;}

/* TASK CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:6px;transition:border-color .15s;}
.card:hover{border-color:#333350;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-title{font-size:14px;font-weight:600;color:var(--bright);flex:1;line-height:1.3;}
.card-job{font-size:11px;color:var(--dim);font-family:monospace;white-space:nowrap;}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.tag{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);color:var(--dim);white-space:nowrap;}
.tag.api{border-color:rgba(79,195,247,.3);color:var(--blue);background:rgba(79,195,247,.08);}
.tag.code{border-color:rgba(179,157,219,.3);color:var(--purple);background:rgba(179,157,219,.08);}
.tag.workflow{border-color:rgba(255,213,79,.3);color:var(--yellow);background:rgba(255,213,79,.08);}
.tag.human{border-color:rgba(255,82,82,.3);color:var(--red);background:rgba(255,82,82,.08);}
.tag.flash{border-color:rgba(255,82,82,.3);color:var(--red);}
.tag.urgent{border-color:rgba(255,171,64,.3);color:var(--orange);}
.tag.routine{border-color:rgba(85,85,112,.3);color:var(--dim);}
.tag.project{border-color:rgba(232,197,71,.2);color:var(--gold);}
.tag.category{border-color:rgba(79,195,247,.2);color:var(--blue);}
.card-detail{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.4;}
.card-detail.blocker{color:var(--red);font-weight:500;}
.card-elapsed{font-size:11px;color:var(--orange);margin-top:4px;}
.card-note{font-size:12px;color:var(--dim);margin-top:4px;font-style:italic;}
.card-date{font-size:10px;color:var(--dim);margin-top:4px;}

/* INLINE EDIT */
.card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.card-actions select,.card-actions button{font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--s2);color:var(--dim);cursor:pointer;font-family:inherit;}
.card-actions select:hover,.card-actions button:hover{border-color:var(--gold);color:var(--gold);}
.card-actions select:focus{outline:1px solid var(--gold);border-color:var(--gold);}
.card-actions .saving{opacity:.5;pointer-events:none;}

/* STATUS COLORS */
.card.blocked-card{border-left:3px solid var(--red);}
.card.active-card{border-left:3px solid var(--green);}
.card.queued-card{border-left:3px solid var(--blue);}
.card.inbox-card{border-left:3px solid var(--yellow);}
.card.done-card{border-left:3px solid var(--dim);opacity:.7;}

/* ADD TASK FORM */
.form-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:6px;}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-row input,.form-row select,.form-row textarea{flex:1;min-width:120px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--s2);color:var(--text);font-size:13px;font-family:inherit;}
.form-row textarea{min-height:60px;resize:vertical;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--gold);}
.form-row input::placeholder,.form-row textarea::placeholder{color:var(--dim);}
.form-msg{font-size:12px;margin-top:6px;min-height:18px;}
.form-msg.ok{color:var(--green);}
.form-msg.err{color:var(--red);}

/* EMPTY STATE */
.empty{text-align:center;padding:20px;color:var(--dim);font-size:12px;font-style:italic;}

/* FOOTER */
.footer{text-align:center;padding:16px;font-size:10px;color:var(--dim);}

/* ERROR */
.error-banner{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);border-radius:8px;padding:12px 16px;margin:12px 16px;color:var(--red);font-size:13px;display:none;}

/* MOBILE */
@media(max-width:600px){
  .stats{grid-template-columns:repeat(3,1fr);}
  .card-title{font-size:13px;}
  .hdr{padding:10px 12px;}
  .logo{font-size:16px;}
  .form-row{flex-direction:column;}
  .form-row input,.form-row select,.form-row textarea{min-width:100%;}
}
@media(max-width:380px){
  .stats{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <span class="logo">TOC DASHBOARD</span>
    <span class="hdr-sub">TASK MANAGEMENT</span>
  </div>
  <div class="hdr-right">
    <span class="status-dot" id="statusDot"></span>
    <span id="lastUpdate" style="font-size:10px;color:var(--dim)"></span>
    <button class="btn" id="refreshBtn" onclick="fetchData()">REFRESH</button>
  </div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="stats" id="statsBar">
  <div class="stat"><div class="stat-num" style="color:var(--yellow)" id="cInbox">-</div><div class="stat-label">INBOX</div></div>
  <div class="stat"><div class="stat-num" style="color:var(--green)" id="cActive">-</div><div class="stat-label">ACTIVE</div></div>
  <div class="stat"><div class="stat-num" style="color:var(--red)" id="cBlocked">-</div><div class="stat-label">BLOCKED</div></div>
  <div class="stat"><div class="stat-num" style="color:var(--blue)" id="cQueued">-</div><div class="stat-label">QUEUED</div></div>
  <div class="stat"><div class="stat-num" style="color:var(--dim)" id="cCompleted">-</div><div class="stat-label">DONE</div></div>
</div>

<div class="main">
  <!-- INBOX -->
  <div class="section" id="secInbox" style="display:none;">
    <div class="section-hdr" onclick="toggleSection('Inbox')">
      <span>YOUR INBOX <span id="inboxCount" style="color:var(--yellow)"></span></span>
      <span class="chevron" id="chevInbox">▼</span>
    </div>
    <div class="section-body" id="bodyInbox">
      <div id="inboxList"></div>
    </div>
  </div>

  <!-- ACTIVE -->
  <div class="section" id="secActive" style="display:none;">
    <div class="section-hdr" onclick="toggleSection('Active')">
      <span>ACTIVE WORK <span id="activeCount"></span></span>
      <span class="chevron" id="chevActive">▼</span>
    </div>
    <div class="section-body" id="bodyActive">
      <div id="activeList"></div>
    </div>
  </div>

  <!-- BLOCKED -->
  <div class="section" id="secBlocked" style="display:none;">
    <div class="section-hdr" onclick="toggleSection('Blocked')">
      <span>BLOCKED <span id="blockedCount" style="color:var(--red)"></span></span>
      <span class="chevron" id="chevBlocked">▼</span>
    </div>
    <div class="section-body" id="bodyBlocked">
      <div id="blockedList"></div>
    </div>
  </div>

  <!-- QUEUED -->
  <div class="section" id="secQueued">
    <div class="section-hdr" onclick="toggleSection('Queued')">
      <span>QUEUE <span id="queuedCount"></span></span>
      <span class="chevron" id="chevQueued">▼</span>
    </div>
    <div class="section-body" id="bodyQueued">
      <div id="queuedList"></div>
    </div>
  </div>

  <!-- COMPLETED -->
  <div class="section" id="secCompleted" style="display:none;">
    <div class="section-hdr" onclick="toggleSection('Completed')">
      <span>RECENT COMPLETIONS <span id="completedCount"></span></span>
      <span class="chevron" id="chevCompleted">▼</span>
    </div>
    <div class="section-body" id="bodyCompleted">
      <div id="completedList"></div>
    </div>
  </div>

  <!-- ADD TASK -->
  <div class="section" id="secAddTask">
    <div class="section-hdr" onclick="toggleSection('AddTask')">
      <span>ADD TASK</span>
      <span class="chevron" id="chevAddTask">▼</span>
    </div>
    <div class="section-body" id="bodyAddTask">
      <div class="form-panel">
        <div class="form-row">
          <input type="text" id="fTask" placeholder="Task title (required)">
        </div>
        <div class="form-row">
          <select id="fAgentType">
            <option value="">Agent Type...</option>
            <option value="🧠 API (Reasoning)">🧠 API (Reasoning)</option>
            <option value="💻 Code (Agentic)">💻 Code (Agentic)</option>
            <option value="🔄 Workflow (n8n)">🔄 Workflow (n8n)</option>
            <option value="👤 Human">👤 Human</option>
          </select>
          <select id="fPriority">
            <option value="">Priority...</option>
            <option value="🔴 FLASH">🔴 FLASH</option>
            <option value="🟠 URGENT">🟠 URGENT</option>
            <option value="⚪ ROUTINE">⚪ ROUTINE</option>
          </select>
        </div>
        <div class="form-row">
          <select id="fProject">
            <option value="">Project...</option>
            <option value="TOC Orchestration">TOC Orchestration</option>
            <option value="Astrid">Astrid</option>
            <option value="Infrastructure">Infrastructure</option>
          </select>
          <select id="fCategory">
            <option value="">Category...</option>
            <option value="Build">Build</option>
            <option value="Fix">Fix</option>
            <option value="Research">Research</option>
            <option value="Review">Review</option>
            <option value="Deploy">Deploy</option>
          </select>
        </div>
        <div class="form-row">
          <textarea id="fDetail" placeholder="Detail / instructions (optional)"></textarea>
        </div>
        <div class="form-row">
          <button class="btn btn-primary" id="submitBtn" onclick="submitTask()">CREATE TASK</button>
        </div>
        <div class="form-msg" id="formMsg"></div>
      </div>
    </div>
  </div>
</div>

<div class="footer">TOC Dashboard v2.0 — Auto-refreshes every 5 minutes</div>

<script>
const API = 'https://65-108-158-192.sslip.io/webhook';
let refreshTimer;
let currentData = null;

const STATUS_OPTIONS = [
  '⬜ Queued',
  '🔵 In Progress',
  '⛔ Blocked',
  '📋 Decomposing',
  '👁️ Review',
  '✅ Complete'
];

function agentTypeClass(at) {
  if (!at) return '';
  if (at.includes('API')) return 'api';
  if (at.includes('Code')) return 'code';
  if (at.includes('Workflow')) return 'workflow';
  if (at.includes('Human')) return 'human';
  return '';
}

function priorityClass(p) {
  if (!p) return 'routine';
  if (p.includes('FLASH')) return 'flash';
  if (p.includes('URGENT')) return 'urgent';
  return 'routine';
}

function elapsed(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ' + (mins % 60) + 'm ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ' + (hrs % 24) + 'h ago';
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',hour12:false});
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleSection(name) {
  const body = document.getElementById('body' + name);
  const chev = document.getElementById('chev' + name);
  const hdr = chev.closest('.section-hdr');
  body.classList.toggle('hidden');
  hdr.classList.toggle('collapsed');
}

function statusSelect(task) {
  let html = '<select onchange="updateStatus(this, \'' + esc(task.id) + '\')">';
  html += '<option value="">Change status...</option>';
  for (const s of STATUS_OPTIONS) {
    html += '<option value="' + esc(s) + '">' + esc(s) + '</option>';
  }
  html += '</select>';
  return html;
}

async function updateStatus(el, pageId) {
  const newStatus = el.value;
  if (!newStatus) return;
  el.classList.add('saving');
  el.disabled = true;
  try {
    const resp = await fetch(API + '/toc-task-update', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ pageId, status: newStatus })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    el.classList.remove('saving');
    el.disabled = false;
    el.value = '';
    // Refresh after short delay
    setTimeout(fetchData, 500);
  } catch (e) {
    el.classList.remove('saving');
    el.disabled = false;
    el.value = '';
    alert('Update failed: ' + e.message);
  }
}

function renderCard(t, type) {
  const atc = agentTypeClass(t.agentType);
  const pc = priorityClass(t.priority);
  let cardClass = 'card';
  if (type === 'blocked') cardClass += ' blocked-card';
  else if (type === 'active') cardClass += ' active-card';
  else if (type === 'queued') cardClass += ' queued-card';
  else if (type === 'inbox') cardClass += ' inbox-card';
  else if (type === 'completed') cardClass += ' done-card';

  let html = '<div class="' + cardClass + '">';
  html += '<div class="card-top">';
  html += '<div class="card-title">' + esc(t.task) + '</div>';
  if (t.jobId) html += '<div class="card-job">' + esc(t.jobId) + '</div>';
  html += '</div>';

  html += '<div class="card-meta">';
  if (t.agentType) html += '<span class="tag ' + atc + '">' + esc(t.agentType) + '</span>';
  if (t.priority) html += '<span class="tag ' + pc + '">' + esc(t.priority) + '</span>';
  if (t.project) html += '<span class="tag project">' + esc(t.project) + '</span>';
  if (t.category) html += '<span class="tag category">' + esc(t.category) + '</span>';
  if (t.assignedAgent) html += '<span class="tag">' + esc(t.assignedAgent) + '</span>';
  html += '</div>';

  if (type === 'active' && t.pickedUpAt) {
    html += '<div class="card-elapsed">Running: ' + elapsed(t.pickedUpAt) + '</div>';
  }
  if (type === 'blocked' && t.blocker) {
    html += '<div class="card-detail blocker">Blocker: ' + esc(t.blocker) + '</div>';
  }
  if ((type === 'blocked' || type === 'inbox') && t.commanderAction) {
    html += '<div class="card-detail" style="color:var(--orange)">Action: ' + esc(t.commanderAction) + '</div>';
  }
  if ((type === 'queued' || type === 'inbox') && t.detail) {
    html += '<div class="card-detail">' + esc(t.detail) + '</div>';
  }
  if (type === 'completed') {
    if (t.completionNote) html += '<div class="card-note">' + esc(t.completionNote) + '</div>';
    if (t.completedAt) html += '<div class="card-date">Completed: ' + fmtDate(t.completedAt) + '</div>';
  }

  // Inline edit — status change for non-completed tasks
  if (type !== 'completed') {
    html += '<div class="card-actions">' + statusSelect(t) + '</div>';
  }

  html += '</div>';
  return html;
}

function render(data) {
  currentData = data;
  const c = data.counts;
  document.getElementById('cInbox').textContent = c.inbox;
  document.getElementById('cActive').textContent = c.active;
  document.getElementById('cBlocked').textContent = c.blocked;
  document.getElementById('cQueued').textContent = c.queued;
  document.getElementById('cCompleted').textContent = c.completed;

  // Inbox
  const secI = document.getElementById('secInbox');
  const listI = document.getElementById('inboxList');
  if (data.inbox.length > 0) {
    secI.style.display = '';
    document.getElementById('inboxCount').textContent = '(' + data.inbox.length + ')';
    listI.innerHTML = data.inbox.map(t => renderCard(t, 'inbox')).join('');
  } else { secI.style.display = 'none'; }

  // Active
  const secA = document.getElementById('secActive');
  const listA = document.getElementById('activeList');
  if (data.active.length > 0) {
    secA.style.display = '';
    document.getElementById('activeCount').textContent = '(' + data.active.length + ')';
    listA.innerHTML = data.active.map(t => renderCard(t, 'active')).join('');
  } else { secA.style.display = 'none'; }

  // Blocked
  const secB = document.getElementById('secBlocked');
  const listB = document.getElementById('blockedList');
  if (data.blocked.length > 0) {
    secB.style.display = '';
    document.getElementById('blockedCount').textContent = '(' + data.blocked.length + ')';
    listB.innerHTML = data.blocked.map(t => renderCard(t, 'blocked')).join('');
  } else { secB.style.display = 'none'; }

  // Queued
  const secQ = document.getElementById('secQueued');
  const listQ = document.getElementById('queuedList');
  secQ.style.display = '';
  document.getElementById('queuedCount').textContent = '(' + data.queued.length + ')';
  if (data.queued.length > 0) {
    listQ.innerHTML = data.queued.map(t => renderCard(t, 'queued')).join('');
  } else {
    listQ.innerHTML = '<div class="empty">Queue empty — all tasks assigned or complete</div>';
  }

  // Completed
  const secC = document.getElementById('secCompleted');
  const listC = document.getElementById('completedList');
  if (data.completed.length > 0) {
    secC.style.display = '';
    document.getElementById('completedCount').textContent = '(' + data.completed.length + ')';
    listC.innerHTML = data.completed.map(t => renderCard(t, 'completed')).join('');
  } else { secC.style.display = 'none'; }
}

async function fetchData() {
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('statusDot');
  const errBanner = document.getElementById('errorBanner');
  btn.classList.add('loading');
  btn.textContent = 'LOADING...';

  try {
    const resp = await fetch(API + '/toc-dashboard');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    render(data);
    dot.className = 'status-dot ok';
    errBanner.style.display = 'none';
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',hour12:false});
  } catch (e) {
    dot.className = 'status-dot err';
    errBanner.textContent = 'Failed to fetch: ' + e.message;
    errBanner.style.display = '';
  }

  btn.classList.remove('loading');
  btn.textContent = 'REFRESH';
}

async function submitTask() {
  const task = document.getElementById('fTask').value.trim();
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  if (!task) {
    msg.className = 'form-msg err';
    msg.textContent = 'Task title is required.';
    return;
  }

  btn.classList.add('loading');
  btn.textContent = 'CREATING...';
  msg.className = 'form-msg';
  msg.textContent = '';

  const body = { task };
  const agentType = document.getElementById('fAgentType').value;
  const priority = document.getElementById('fPriority').value;
  const project = document.getElementById('fProject').value;
  const category = document.getElementById('fCategory').value;
  const detail = document.getElementById('fDetail').value.trim();
  if (agentType) body.agentType = agentType;
  if (priority) body.priority = priority;
  if (project) body.project = project;
  if (category) body.category = category;
  if (detail) body.detail = detail;

  try {
    const resp = await fetch(API + '/toc-task-create', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const result = await resp.json();
    msg.className = 'form-msg ok';
    msg.textContent = 'Task created successfully.';
    // Clear form
    document.getElementById('fTask').value = '';
    document.getElementById('fAgentType').value = '';
    document.getElementById('fPriority').value = '';
    document.getElementById('fProject').value = '';
    document.getElementById('fCategory').value = '';
    document.getElementById('fDetail').value = '';
    // Refresh
    setTimeout(fetchData, 500);
  } catch (e) {
    msg.className = 'form-msg err';
    msg.textContent = 'Create failed: ' + e.message;
  }

  btn.classList.remove('loading');
  btn.textContent = 'CREATE TASK';
}

// Initial load
fetchData();

// Auto-refresh every 5 minutes
refreshTimer = setInterval(fetchData, 5 * 60 * 1000);
</script>
</body>
</html>
